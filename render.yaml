services:
  - type: web
    name: inboxed-api
    env: python
    rootDir: backend
    buildCommand: "pip install uv && uv sync"
    startCommand: "uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MILLIONVERIFIER_API_KEY
        sync: false
      - key: HUNTER_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_WEBHOOK_SECRET
        sync: false
      - key: ZOHO_IMAP_HOST
        value: imap.zoho.com
      - key: ZOHO_IMAP_USER
        sync: false
      - key: ZOHO_IMAP_PASSWORD
        sync: false
      - key: ZOHO_REPLY_TO
        sync: false

  - type: worker
    name: inboxed-worker
    env: python
    rootDir: backend
    buildCommand: "pip install uv && uv sync"
    startCommand: "uv run python -m app.worker.runner"
    envVars:
      - fromGroup: inboxed-secrets
